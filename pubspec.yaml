name: fixit_service
description: Aplikasi booking service laptop & PC di Indramayu.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  http_parser: ^4.0.0
  dio: ^5.3.0
  connectivity_plus: ^5.0.0
  permission_handler: ^11.0.0
  provider: ^6.1.1
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  flutter_rating_bar: ^4.0.1
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.5
  google_fonts: ^6.1.0
  url_launcher: ^6.2.2
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  google_sign_in: ^6.2.1 
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/google_g.png